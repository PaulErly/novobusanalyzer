name: Windows Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell

    env:
      BUILD_DIR: build_ci
      QT_VERSION: 6.8.3
      QT_ARCH: win64_msvc2022_64
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkg-bincache,readwrite
      VCPKG_DOWNLOADS: ${{ github.workspace }}\vcpkg-downloads
      VCPKG_BINARY_CACHE: ${{ github.workspace }}\vcpkg-bincache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workflow start
        run: Write-Host ("[{0}] workflow start" -f (Get-Date).ToString("o"))

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: ${{ env.QT_ARCH }}
          modules: qtmultimedia qt5compat
          cache: true

      - name: Locate vcpkg
        id: vcpkg
        run: |
          $vcpkgRoot = "${env:VCPKG_INSTALLATION_ROOT}"
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot)) {
            $candidate = Join-Path $env:ProgramFiles 'vcpkg'
            if (Test-Path $candidate) {
              $vcpkgRoot = $candidate
            }
          }
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot) -or -not (Test-Path (Join-Path $vcpkgRoot 'scripts\buildsystems\vcpkg.cmake'))) {
            throw 'vcpkg was not found on the runner.'
          }

          $isShallow = $false
          try {
            $isShallow = ((git -C $vcpkgRoot rev-parse --is-shallow-repository) -eq 'true')
          } catch {
            $isShallow = $false
          }

          if ($isShallow) {
            git -C $vcpkgRoot fetch --unshallow --tags origin
          } else {
            git -C $vcpkgRoot fetch --tags origin
          }

          "root=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.QT_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'Sources/**/CMakeLists.txt', '**/cmake/*.cmake', '.github/workflows/windows-build.yml') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.QT_VERSION }}-

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkg-bincache-${{ runner.os }}-x64-windows-${{ env.QT_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'CMakeLists.txt', 'Sources/**/CMakeLists.txt', '**/cmake/*.cmake', '.github/workflows/windows-build.yml') }}
          restore-keys: |
            vcpkg-bincache-${{ runner.os }}-x64-windows-${{ env.QT_VERSION }}-

      - name: Configure x64
        run: |
          Write-Host ("[{0}] configure start" -f (Get-Date).ToString("o"))
          cmake -S . -B $env:BUILD_DIR `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DQt6_DIR="${env:Qt6_DIR}" `
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.vcpkg.outputs.root }}\scripts\buildsystems\vcpkg.cmake"
          Write-Host ("[{0}] configure end" -f (Get-Date).ToString("o"))

      - name: Build Release
        run: |
          Write-Host ("[{0}] release build start" -f (Get-Date).ToString("o"))
          cmake --build $env:BUILD_DIR --config Release -- /m:1
          Write-Host ("[{0}] release build end" -f (Get-Date).ToString("o"))

      - name: Validate runtime outputs
        run: |
          Write-Host ("[{0}] validate start" -f (Get-Date).ToString("o"))

          $relDir = Join-Path $env:BUILD_DIR 'Sources\BUSMASTER\Application\Release'
          $required = @(
            Join-Path $relDir 'NovoBusAnalyzer.exe'
            Join-Path $relDir 'ConverterPlugins\DBC2DBFConverter.dll'
            Join-Path $relDir 'ConverterPlugins\DBC2DBFConverterLibrary.dll'
            Join-Path $relDir 'BUSMASTER.chm'
            'Tests\Samples\CAN\dbc_smoke.dbc'
          )

          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing expected file: $path"
            }
          }

          Write-Host ("[{0}] validate end" -f (Get-Date).ToString("o"))

      - name: Verify DBC converter is x64
        run: |
          function Get-PeMachine {
            param([string]$Path)
            $fs = [System.IO.File]::OpenRead($Path)
            try {
              $br = New-Object System.IO.BinaryReader($fs)
              $fs.Seek(0x3C, [System.IO.SeekOrigin]::Begin) | Out-Null
              $peOffset = $br.ReadInt32()
              $fs.Seek($peOffset + 4, [System.IO.SeekOrigin]::Begin) | Out-Null
              return $br.ReadUInt16()
            }
            finally {
              $fs.Dispose()
            }
          }

          $dll = Join-Path $env:BUILD_DIR 'Sources\BUSMASTER\Application\Release\ConverterPlugins\DBC2DBFConverter.dll'
          $machine = Get-PeMachine -Path $dll
          if ($machine -ne 0x8664) {
            throw "DBC2DBFConverter.dll is not x64. Machine=0x{0:X4}" -f $machine
          }
          Write-Host ("DBC2DBFConverter.dll machine=0x{0:X4}" -f $machine)

      - name: Install NSIS
        run: |
          $makensis = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if (-not $makensis) {
            Write-Host "NSIS not found on PATH; installing via Chocolatey."
            choco install nsis -y --no-progress
            $nsisDir = Join-Path ${env:ProgramFiles(x86)} 'NSIS'
            $env:Path = "$nsisDir;$env:Path"
          }

          $makensis = Get-Command makensis.exe -ErrorAction SilentlyContinue
          if (-not $makensis) {
            throw 'makensis.exe was not found after NSIS installation.'
          }

          Write-Host ("makensis={0}" -f $makensis.Source)

      - name: Build installer
        run: |
          Write-Host ("[{0}] installer build start" -f (Get-Date).ToString("o"))
          $installerDir = Join-Path $env:BUILD_DIR 'installer'
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null

          $releaseDir = Join-Path $env:BUILD_DIR 'Sources\BUSMASTER\Application\Release'
          $sampleDbc = Join-Path $env:GITHUB_WORKSPACE 'Tests\Samples\CAN\dbc_smoke.dbc'
          $installerOut = Join-Path $installerDir 'NovoBusAnalyzer_Setup.exe'
          $nsisScript = Join-Path $env:GITHUB_WORKSPACE 'packaging\ci_novobusanalyzer_installer.nsi'

          & $((Get-Command makensis.exe).Source) `
            "/DRELEASE_DIR=$releaseDir" `
            "/DSAMPLE_DBC=$sampleDbc" `
            "/DOUTFILE=$installerOut" `
            $nsisScript

          if (-not (Test-Path $installerOut)) {
            throw "Installer was not created: $installerOut"
          }

          Get-Item $installerOut | Select-Object FullName, Length, LastWriteTime | Format-List
          Write-Host ("[{0}] installer build end" -f (Get-Date).ToString("o"))

      - name: Upload Release runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: busmaster-windows-release
          path: |
            build_ci\Sources\BUSMASTER\Application\Release\**
            !build_ci\Sources\BUSMASTER\Application\Release\*.ilk
            !build_ci\Sources\BUSMASTER\Application\Release\*.exp
            !build_ci\Sources\BUSMASTER\Application\Release\*.obj
            !build_ci\Sources\BUSMASTER\Application\Release\**\*.pdb
            build_ci\Sources\BUSMASTER\cmake\*.log
            build_ci\vcpkg-manifest-install.log
          if-no-files-found: warn

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: busmaster-windows-installer
          path: build_ci\installer\NovoBusAnalyzer_Setup.exe
          if-no-files-found: error

      - name: Mark workflow end
        run: Write-Host ("[{0}] workflow end" -f (Get-Date).ToString("o"))
